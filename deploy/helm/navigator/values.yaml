# Default values for navigator

replicaCount: 1

image:
  repository: navigator-server
  pullPolicy: IfNotPresent
  tag: "dev"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: NodePort
  port: 8080
  nodePort: 30051

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Server configuration
server:
  logLevel: info
  sandboxNamespace: navigator
  dbUrl: "sqlite::memory:?cache=shared"
  initImage: "busybox:1.36"
  sandboxImage: "navigator-factory:dev"
  # gRPC endpoint for sandboxes to callback to Navigator (must be reachable from pods)
  grpcEndpoint: "http://navigator.navigator.svc.cluster.local:8080"

gateway:
  enabled: true
  name: navigator-gateway
  className: envoy-gateway
  createGatewayClass: true
  listenerPort: 8080
  tls:
    enabled: false
    secretName: navigator-gateway-tls
    clientCaSecretName: navigator-gateway-client-ca
    cliSecretName: navigator-cli-client
    listenerPort: 443
    jobImage: alpine:3.20
