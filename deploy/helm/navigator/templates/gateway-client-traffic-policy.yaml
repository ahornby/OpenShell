{{- if and .Values.gateway.enabled .Values.gateway.tls.enabled }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: {{ include "navigator.fullname" . }}-mtls
  labels:
    {{- include "navigator.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gateway.name }}
  tls:
    clientValidation:
      caCertificateRefs:
        - kind: Secret
          group: ""
          name: {{ .Values.gateway.tls.clientCaSecretName }}
{{- end }}
