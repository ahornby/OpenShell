{{- if .Values.gateway.enabled }}
{{- $listenerPort := ternary (default 443 .Values.gateway.tls.listenerPort) .Values.gateway.listenerPort .Values.gateway.tls.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: {{ include "navigator.fullname" . }}-grpc
  labels:
    {{- include "navigator.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      port: {{ $listenerPort }}
  rules:
    - backendRefs:
        - name: {{ include "navigator.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
