{{- if and .Values.gateway.enabled .Values.gateway.tls.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "navigator.fullname" . }}-gateway-pki
  labels:
    {{- include "navigator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-1"
{{- end }}
