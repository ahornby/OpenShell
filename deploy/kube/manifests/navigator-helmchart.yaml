# HelmChart CR for auto-deploying Navigator via k3s Helm controller
# This manifest is placed in /var/lib/rancher/k3s/server/manifests/ and
# automatically installed when the k3s cluster starts.
#
# The chart tarball is served from the k3s static file server at:
# https://<k8s-api>/static/charts/navigator-0.1.0.tgz

apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: navigator
  namespace: kube-system
spec:
  chart: https://%{KUBERNETES_API}%/static/charts/navigator-0.1.0.tgz
  targetNamespace: navigator
  createNamespace: true
  valuesContent: |-
    image:
      repository: navigator-server
      tag: dev
      pullPolicy: IfNotPresent
    server:
      sandboxImage: navigator-sandbox:dev
    gateway:
      tls:
        enabled: true
        listenerPort: 443
